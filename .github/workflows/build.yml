name: Reusable Build Workflow

on:
  workflow_call:
    inputs:
      use-rc-index:
        description: 'Replace index.adoc with index_rc.adoc before build'
        type: boolean
        default: false
      upload-artifacts:
        description: 'Upload build artifacts'
        type: boolean
        default: false
      create-release:
        description: 'Create a GitHub release on tags'
        type: boolean
        default: false
      release-is-prerelease:
        description: 'Mark release as prerelease'
        type: boolean
        default: false
      release-name-prefix:
        description: 'Prefix for release name'
        type: string
        default: 'Release'
      deploy:
        description: 'Deploy to GitHub Pages on tags'
        type: boolean
        default: false
      deploy-destination-dir:
        description: 'Subdirectory for deployment'
        type: string
        default: ''
      deploy-keep-files:
        description: 'Keep existing files in deploy destination'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update index.adoc for Release Candidate
        if: inputs.use-rc-index
        run: |
          rm docs/index.adoc
          mv docs/index_rc.adoc docs/index.adoc

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Curriculum
        run: ./gradle-tools/gradlew buildDocs

      - name: Upload Build Artifacts
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: curriculum files (PDF and HTML)
          path: |
            build/*.pdf
            build/*.html
          retention-days: 10

      - name: Set Release Version
        if: (inputs.create-release || inputs.deploy) && startsWith(github.ref, 'refs/tags/')
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Prepare Deployment
        if: inputs.create-release && startsWith(github.ref, 'refs/tags/')
        run: |
          rm -rf ./build/tmp
          cp ./docs-ext/curriculum-*.pdf ./build 2>/dev/null || :
          zip -r release.zip ./build
          mkdir release_dir
          cp ./build/curriculum-*.pdf ./release_dir 2>/dev/null || :
          mv release.zip ./release_dir/release-${{ env.RELEASE_VERSION }}.zip

      - name: Create Release
        if: inputs.create-release && startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_VERSION }}
          name: ${{ inputs.release-name-prefix }} ${{ env.RELEASE_VERSION }}
          draft: false
          prerelease: ${{ inputs.release-is-prerelease }}
          bodyFile: "CHANGELOG.md"
          artifacts: "license-copyright/LICENSE.adoc,release_dir/*.pdf,release_dir/*.zip"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        if: inputs.deploy && startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          destination_dir: ${{ inputs.deploy-destination-dir }}
          keep_files: ${{ inputs.deploy-keep-files }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: Publish ${{ inputs.release-name-prefix }} ${{ env.RELEASE_VERSION }}
